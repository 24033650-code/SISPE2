<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro de la persona Usuaria</title>

<link rel="stylesheet" href="estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/4adad3e7d4.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="form-container">

<h2>Registro de la persona Usuaria</h2>

<form>

<div class="input-group">

<label>Nombre</label>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Tu nombre">
</div>

</div>


<div class="input-group">

<label>Apellido</label>

<div class="input-box">
<i class="fa-solid fa-id-card"></i>
<input type="text" placeholder="Tu apellido">
</div>

</div>


<div class="input-group">

<label>Correo Electrónico</label>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="correo@email.com">
</div>

</div>


<div class="input-group">

<label>Contraseña</label>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password">
</div>

</div>


<div class="input-group">

<label>Sobre ti</label>

<textarea rows="3" placeholder="Cuéntanos un poco sobre ti"></textarea>

</div>


<p class="intereses">Intereses</p>

<div class="checkbox-group">

<label class="checkbox">
<input type="checkbox">
<span>Tecnología</span>
</label>

<label class="checkbox">
<input type="checkbox">
<span>Arte</span>
</label>

<label class="checkbox">
<input type="checkbox">
<span>Deporte</span>
</label>

</div>

<button class="btn">Registrarse</button>

</form>

</div>

</body>
</html>
